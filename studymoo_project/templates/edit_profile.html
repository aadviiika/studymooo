{% extends 'base.html' %}
{% block title %}Edit Profile — StudyMoo{% endblock %}

{% block content %}
<div class="container auth-page">
  <div class="auth-card auth-card-wide">
    <div class="auth-header">
      <h1>Edit Profile</h1>
      <p>Update your info and bio.</p>
    </div>

    <form method="POST" class="auth-form">
      {% csrf_token %}

      <div class="form-row">
        <div class="form-group form-col">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" value="{{ form.initial.first_name }}" class="form-input">
        </div>
        <div class="form-group form-col">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" value="{{ form.initial.last_name }}" class="form-input">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" value="{{ form.initial.email }}" class="form-input">
      </div>

      <div class="form-group {% if form.bio.errors %}has-error{% endif %}">
        <label class="form-label">Bio</label>
        {{ form.bio }}
        {% for error in form.bio.errors %}<span class="form-error">{{ error }}</span>{% endfor %}
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'profile' username=request.user.username %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
